        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-background text-on-background font-body-md min-h-screen pb-32">
<!-- Top Navigation Bar -->
<header class="w-full top-0 sticky bg-background flex items-center px-container-margin py-md z-50">
<button class="text-primary hover:bg-surface-container-low transition-colors active:scale-95 p-base rounded-full" onclick="history.back()">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="ml-md font-headline-lg-mobile text-headline-lg-mobile text-primary">Signaler un disparu</h1>
</header>
<main class="px-container-margin mt-md">
<!-- Progress Tracker -->
<div class="flex items-center justify-start gap-base mb-xl">
<div class="h-2 w-6 bg-primary-container rounded-full transition-all duration-300"></div>
<div class="h-2 w-2 bg-outline-variant rounded-full"></div>
<div class="h-2 w-2 bg-outline-variant rounded-full"></div>
<span class="ml-sm font-label-bold text-label-bold text-primary">Étape 1 sur 3</span>
</div>
<!-- Warning Notice -->
<div class="bg-error-container/30 border-l-4 border-error p-md rounded-lg mb-xl soft-shadow">
<div class="flex gap-sm">
<span class="material-symbols-outlined text-error" style="font-variation-settings: 'FILL' 1;">warning</span>
<p class="font-body-md text-on-surface">Seuls les parents et tuteurs légaux peuvent soumettre des signalements d'enfants disparus.</p>
</div>
</div>
<!-- Form Card -->
<div class="bg-surface-container-lowest rounded-xl p-lg soft-shadow border border-surface-variant">
<form class="space-y-lg">
<!-- Photo Upload Area -->
<div class="flex flex-col items-center justify-center p-xl border-2 border-dashed border-outline-variant rounded-xl bg-surface-container-low hover:bg-surface-container-high transition-colors cursor-pointer group">
<div class="w-24 h-24 rounded-lg bg-surface-container-highest flex items-center justify-center mb-md group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-primary text-[48px]">add_a_photo</span>
</div>
<span class="font-label-bold text-label-bold text-primary">Ajouter une photo récente</span>
<span class="font-label-sm text-label-sm text-outline mt-base">Format JPG ou PNG (Max. 5MB)</span>
</div>
<!-- Personal Info Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<div class="space-y-base">
<label class="font-label-bold text-label-bold text-on-surface px-base">Nom complet de l'enfant</label>
<input class="w-full p-md bg-surface-container-lowest border border-outline-variant rounded-lg focus-glow font-body-md" placeholder="Ex: Jean Dupont" type="text"/>
</div>
<div class="grid grid-cols-2 gap-md">
<div class="space-y-base">
<label class="font-label-bold text-label-bold text-on-surface px-base">Âge</label>
<input class="w-full p-md bg-surface-container-lowest border border-outline-variant rounded-lg focus-glow font-body-md" placeholder="Ans" type="number"/>
</div>
<div class="space-y-base">
<label class="font-label-bold text-label-bold text-on-surface px-base">Sexe</label>
<select class="w-full p-md bg-surface-container-lowest border border-outline-variant rounded-lg focus-glow font-body-md appearance-none">
<option disabled="" selected="" value="">Choisir</option>
<option value="M">Masculin</option>
<option value="F">Féminin</option>
<option value="O">Autre</option>
</select>
</div>
</div>
</div>
<!-- Relationship Status (Required) -->
<div class="space-y-base">
<label class="font-label-bold text-label-bold text-on-surface px-base">Lien de parenté (Requis)</label>
<div class="flex flex-wrap gap-sm">
<label class="flex-1 min-w-[100px] cursor-pointer">
<input class="hidden peer" name="relationship" type="radio" value="mere"/>
<div class="p-md text-center border border-outline-variant rounded-lg font-label-bold text-label-bold peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary transition-all">Mère</div>
</label>
<label class="flex-1 min-w-[100px] cursor-pointer">
<input class="hidden peer" name="relationship" type="radio" value="pere"/>
<div class="p-md text-center border border-outline-variant rounded-lg font-label-bold text-label-bold peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary transition-all">Père</div>
</label>
<label class="flex-1 min-w-[100px] cursor-pointer">
<input class="hidden peer" name="relationship" type="radio" value="tuteur"/>
<div class="p-md text-center border border-outline-variant rounded-lg font-label-bold text-label-bold peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary transition-all">Tuteur Légal</div>
</label>
</div>
</div>
<!-- Incident Details -->
<div class="space-y-lg">
<div class="space-y-base">
<label class="font-label-bold text-label-bold text-on-surface px-base">Lieu de disparition</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">location_on</span>
<input class="w-full pl-xl p-md bg-surface-container-lowest border border-outline-variant rounded-lg focus-glow font-body-md" placeholder="Dernier endroit connu..." type="text"/>
</div>
</div>
<div class="space-y-base">
<label class="font-label-bold text-label-bold text-on-surface px-base">Date de disparition</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline">calendar_month</span>
<input class="w-full pl-xl p-md bg-surface-container-lowest border border-outline-variant rounded-lg focus-glow font-body-md" type="date"/>
</div>
</div>
<div class="space-y-base">
<label class="font-label-bold text-label-bold text-on-surface px-base">Description physique</label>
<textarea class="w-full p-md bg-surface-container-lowest border border-outline-variant rounded-lg focus-glow font-body-md resize-none" placeholder="Taille, vêtements portés, signes distinctifs..." rows="3"></textarea>
</div>
<div class="space-y-base">
<label class="font-label-bold text-label-bold text-on-surface px-base">Notes additionnelles</label>
<textarea class="w-full p-md bg-surface-container-lowest border border-outline-variant rounded-lg focus-glow font-body-md resize-none" placeholder="Toute information jugée utile..." rows="2"></textarea>
</div>
</div>
</form>
</div>
<p class="text-center pb-md"><a class="text-primary font-label-sm hover:underline" href="./create_missing_report.html">Utiliser le formulaire détaillé</a></p>
</main>
<!-- Navigation Shell (Fixed Bottom) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-container-margin py-md bg-surface-container-lowest dark:bg-surface-dim shadow-[0px_-4px_20px_rgba(108,77,255,0.06)] rounded-t-lg">
<button class="flex flex-col items-center justify-center text-secondary px-lg py-sm hover:opacity-90 active:scale-98 transition-all duration-200" onclick="history.back()">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined">chevron_left</span>
<span class="font-label-bold text-label-bold">Previous</span>
</div>
</button>
<button class="flex flex-col items-center justify-center bg-primary text-on-primary rounded-full px-xl py-sm hover:opacity-90 active:scale-98 transition-all duration-200 shadow-lg" onclick="window.location.href='./v_rifier_le_lien_de_parent.html'">
<div class="flex items-center gap-xs">
<span class="font-label-bold text-label-bold">Continue</span>
<span class="material-symbols-outlined">chevron_right</span>
</div>
</button>
</nav>
<script>
        // Simple interactive effect for radio buttons
        const radioGroups = document.querySelectorAll('input[type="radio"]');
        radioGroups.forEach(radio => {
            radio.addEventListener('change', (e) => {
                // Add a subtle bounce when selecting
                const parent = e.target.closest('label');
                parent.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    parent.style.transform = 'scale(1)';
                }, 100);
            });
        });

        // Photo upload placeholder interaction
        const uploadArea = document.querySelector('.border-dashed');
        uploadArea.addEventListener('click', () => {
            console.log('Upload triggered');
            // Mock file picker feedback
            uploadArea.classList.add('bg-primary-container/10');
            setTimeout(() => uploadArea.classList.remove('bg-primary-container/10'), 300);
        });
    </script>
</body></html>
