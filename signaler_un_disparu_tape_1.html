<body class="bg-background text-on-background font-body-md min-h-screen pb-32">
<!-- Top Navigation Bar -->

<button class="text-primary hover:bg-surface-container-low transition-colors active:scale-95 p-base rounded-full" onclick="history.back()">

<h1 class="ml-md font-headline-lg-mobile text-headline-lg-mobile text-primary">Signaler un disparu</h1>
</header>
<main class="px-container-margin mt-md">
<!-- Progress Tracker -->
<div class="flex items-center justify-start gap-base mb-xl">
<div class="h-2 w-6 bg-primary-container rounded-full transition-all duration-300"></div>
<div class="h-2 w-2 bg-outline-variant rounded-full"></div>
<div class="h-2 w-2 bg-outline-variant rounded-full"></div>
<span class="ml-sm font-label-bold text-label-bold text-primary">Étape 1 sur 3</span>
</div>
<!-- Warning Notice -->
<div class="bg-error-container/30 border-l-4 border-error p-md rounded-lg mb-xl soft-shadow">
<div class="flex gap-sm">
<span class="material-symbols-outlined text-error" style="font-variation-settings: 'FILL' 1;">warning</span>
<p class="font-body-md text-on-surface">Seuls les parents et tuteurs légaux peuvent soumettre des signalements d'enfants disparus.</p>
</div>
</div><!-- Form Card -->
<div class="bg-surface-container-lowest rounded-xl p-lg soft-shadow border border-surface-variant">
<form class="space-y-lg" id="missingForm">
<!-- Photo Upload Area -->
<div id="uploadContainer" class="flex flex-col items-center justify-center p-xl border-2 border-dashed border-outline-variant rounded-xl bg-surface-container-low hover:bg-surface-container-high transition-colors cursor-pointer group relative overflow-hidden">
<div class="w-24 h-24 rounded-lg bg-surface-container-highest flex items-center justify-center mb-md group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-primary text-[48px]">add_a_photo</span>
</div>
<span class="font-label-bold text-label-bold text-primary">Ajouter une photo récente</span>
<span class="font-label-sm text-label-sm text-outline mt-base">Format JPG ou PNG (Max. 5MB)</span>
<input id="fileInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" type="file"/>
</div>
<!-- Personal Info Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<div class="space-y-base">
<label class="font-label-bold text-label-bold text-on-surface px-base">Nom complet de l'enfant</label>
<input id="fullName" class="w-full p-md bg-surface-container-lowest border border-outline-variant rounded-lg focus-glow font-body-md" placeholder="Ex: Jean Dupont" type="text"/>
</div>
<div class="grid grid-cols-2 gap-md">
<div class="space-y-base">
<label class="font-label-bold text-label-bold text-on-surface px-base">Âge</label>
<input id="age" class="w-full p-md bg-surface-container-lowest border border-outline-variant rounded-lg focus-glow font-body-md" placeholder="Ans" type="number"/>
</div>
<div class="space-y-base">
<label class="font-label-bold text-label-bold text-on-surface px-base">Sexe</label>
<select id="gender" class="w-full p-md bg-surface-container-lowest border border-outline-variant rounded-lg focus-glow font-body-md appearance-none">
<option disabled="" selected="" value="">Choisir</option>
<option value="garcon">Masculin</option>
<option value="fille">Féminin</option>
</select>
</div>
</div>
</div>
<!-- Relationship Status (Required) -->
<div class="space-y-base">
<label class="font-label-bold text-label-bold text-on-surface px-base">Lien de parenté (Requis)</label>
<div class="flex flex-wrap gap-sm">
<label class="flex-1 min-w-[100px] cursor-pointer">
<input class="hidden peer" name="relationship" type="radio" value="mere" checked/>
<div class="p-md text-center border border-outline-variant rounded-lg font-label-bold text-label-bold peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary transition-all">Mère</div>
</label>
<label class="flex-1 min-w-[100px] cursor-pointer">
<input class="hidden peer" name="relationship" type="radio" value="pere"/>
<div class="p-md text-center border border-outline-variant rounded-lg font-label-bold text-label-bold peer-checked:bg-primary-container peer-checked:text-on-primary-container peer-checked:border-primary transition-all">Père</div>
</label>
<label class="flex-1 min-w-[100px] cursor-pointer">

<div class="space-y-base">

<textarea id="additionalNotes" class="w-full p-md bg-surface-container-lowest border border-outline-variant rounded-lg focus-glow font-body-md resize-none" placeholder="Toute information jugée utile..." rows="2"></textarea>

<script type="module">
import { formDraftState } from './src/formDraftState.js';

document.addEventListener('DOMContentLoaded', () => {
    const fileInput = document.getElementById('fileInput');
    const uploadContainer = document.getElementById('uploadContainer');
    const fullNameInput = document.getElementById('fullName');
    const ageInput = document.getElementById('age');
    const genderSelect = document.getElementById('gender');
    const locationInput = document.getElementById('disappearanceLocation');
    const dateInput = document.getElementById('disappearanceDate');
    const physicalInput = document.getElementById('physicalDescription');
    const notesInput = document.getElementById('additionalNotes');
    const btnSubmit = document.getElementById('btnSubmitStep1');

    // Radio buttons
    const radioGroups = document.querySelectorAll('input[type="radio"]');
    radioGroups.forEach(radio => {
        radio.addEventListener('change', (e) => {
            const parent = e.target.closest('label');
            if (parent) {
                parent.style.transform = 'scale(0.95)';
                setTimeout(() => { parent.style.transform = 'scale(1)'; }, 100);
            }
        });
    });

    function renderPhotoPreview(base64) {
        uploadContainer.innerHTML = `
            <img src="${base64}" class="absolute inset-0 w-full h-full object-cover" />
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
                <span class="text-white font-label-bold text-label-bold">Changer la photo</span>
            </div>
            <input id="fileInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" type="file"/>
        `;
        document.getElementById('fileInput').addEventListener('change', handleFileChange);
    }

    function handleFileChange(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                const base64 = evt.target.result;
                formDraftState.updateMissingDraft({ photo: base64 });
                renderPhotoPreview(base64);
            };
            reader.readAsDataURL(file);
        }
    }

    if (fileInput) {
        fileInput.addEventListener('change', handleFileChange);
    }

    // Restore existing draft
    const draft = formDraftState.getMissingDraft();
    if (draft.photo) {
        renderPhotoPreview(draft.photo);
    }
    if (draft.name) fullNameInput.value = draft.name;
    if (draft.age) ageInput.value = draft.age;
    if (draft.gender) genderSelect.value = draft.gender;
    if (draft.location) locationInput.value = draft.location;
    if (draft.date) dateInput.value = draft.date;
    if (draft.physicalDescription) physicalInput.value = draft.physicalDescription;
    if (draft.notes) notesInput.value = draft.notes;
    if (draft.relationship) {
        const radio = document.querySelector(`input[name="relationship"][value="${draft.relationship}"]`);
        if (radio) radio.checked = true;
    }

    // Save and redirect
    btnSubmit.addEventListener('click', () => {
        const checkedRadio = document.querySelector('input[name="relationship"]:checked');
        const relationship = checkedRadio ? checkedRadio.value : "mere";

        formDraftState.updateMissingDraft({
            name: fullNameInput.value.trim() || "Anonyme",
            age: parseInt(ageInput.value) || 8,
            gender: genderSelect.value || "garcon",
            location: locationInput.value.trim() || "Yaoundé",
            date: dateInput.value || new Date().toISOString().split('T')[0],
            physicalDescription: physicalInput.value.trim() || "Aucune description",
            notes: notesInput.value.trim() || "",
            relationship: relationship,
            height: "1m20"
        });

        window.location.href = './v_rifier_le_lien_de_parent.html';
    });
});
</script>
