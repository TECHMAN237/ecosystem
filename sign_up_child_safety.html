<script>
        // Toggle Password Visibility
        const passToggleBtn = document.getElementById('togglePasswordBtn');
        if (passToggleBtn) {
            passToggleBtn.addEventListener('click', () => {
                const passwordInput = document.getElementById('password');
                const eyeIcon = document.getElementById('eyeIcon');
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    eyeIcon.textContent = 'visibility_off';
                    eyeIcon.setAttribute('data-icon', 'visibility_off');
                } else {
                    passwordInput.type = 'password';
                    eyeIcon.textContent = 'visibility';
                    eyeIcon.setAttribute('data-icon', 'visibility');
                }
            });
        }

        // Simple button interaction feedback
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
        });
    </script>
<script type="importmap">

  "imports": {

  }

<script type="module">
import { supabase } from "./src/supabaseClient.js";

const form = document.getElementById('signupForm');
const errorMsg = document.getElementById('errorMsg');
const errorText = document.getElementById('errorText');
const submitBtn = document.getElementById('submitBtn');
const btnText = document.getElementById('btnText');
const btnIcon = document.getElementById('btnIcon');
const googleBtn = document.getElementById('googleBtn');

if (googleBtn) {
    googleBtn.addEventListener('click', async () => {
        errorMsg.classList.add('hidden');
        errorText.textContent = '';
        try {
            console.log("Initiating Google Sign-Up via Supabase...");
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/'
                }
            });
            if (error) {
                showError("Google Sign-Up failed: " + error.message);
            }
        } catch (err) {
            console.error("Google sign up error:", err);
            showError("An unexpected error occurred during Google Sign-Up.");
        }
    });
}

// Check session and listen to auth state changes
supabase.auth.onAuthStateChange((event, session) => {
    if (session) {
        console.log("Session active (event: " + event + "). Redirecting to Home...");
        localStorage.setItem('is_guest', 'false');
        window.location.href = './home_child_safety_v1.html';
    }
});

const btnGuest = document.getElementById('btnGuest');
if (btnGuest) {
    btnGuest.addEventListener('click', () => {
        localStorage.setItem('is_guest', 'true');
        sessionStorage.setItem('childSafetyAccountType', 'Guest');
        window.location.href = './home_child_safety_v1.html';
    });
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // Reset state
    errorMsg.classList.add('hidden');
    errorText.textContent = '';
    
    const fullname = document.getElementById('fullname').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const terms = document.getElementById('terms').checked;
    
    // Validation
    if (!fullname) {
        showError('Veuillez saisir votre nom complet.');
        return;
    }
    if (!email) {
        showError('Veuillez saisir votre adresse e-mail.');
        return;
    }
    if (!password) {
        showError('Veuillez saisir un mot de passe.');
        return;
    }
    if (password.length < 6) {
        showError('Le mot de passe doit contenir au moins 6 caractères.');
        return;
    }
    if (!terms) {
        showError('Vous devez accepter les Conditions d\'utilisation et la Politique de confidentialité.');
        return;
    }
    
    // Show loading
    setLoading(true);
    
    try {
        // Store values temporarily in sessionStorage
        sessionStorage.setItem('signup_fullname', fullname);
        sessionStorage.setItem('signup_email', email);
        sessionStorage.setItem('signup_password', password);
        sessionStorage.setItem('signup_terms_accepted', 'true');
        
        console.log('Step 1 complete. Temporarily saved fields. Navigating to Step 2...');
        setTimeout(() => {
            window.location.href = './account_type_selection_updated_flow.html';
        }, 500);
        
    } catch (err) {
        console.error('Unexpected storage error:', err);
        showError(err.message || 'An unexpected error occurred during state preservation.');
        setLoading(false);
    }
});

function showError(msg) {
    errorText.textContent = msg;
    errorMsg.classList.remove('hidden');
    errorMsg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function setLoading(isLoading) {
    if (isLoading) {
        submitBtn.disabled = true;
        btnText.textContent = 'Création du compte...';
        btnIcon.textContent = 'pending';
        btnIcon.classList.add('animate-spin');
    } else {
        submitBtn.disabled = false;
        btnText.textContent = 'Créer un compte';
        btnIcon.textContent = 'arrow_forward';
        btnIcon.classList.remove('animate-spin');
    }
}
</script>
