<script>
        // Toggle Password Visibility
        const passToggleBtn = document.getElementById('togglePasswordBtn');
        if (passToggleBtn) {
            passToggleBtn.addEventListener('click', () => {
                const passwordInput = document.getElementById('password');
                const eyeIcon = document.getElementById('eyeIcon');
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    eyeIcon.textContent = 'visibility_off';
                    eyeIcon.setAttribute('data-icon', 'visibility_off');
                } else {
                    passwordInput.type = 'password';
                    eyeIcon.textContent = 'visibility';
                    eyeIcon.setAttribute('data-icon', 'visibility');
                }
            });
        }

        // Simple button interaction feedback
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
        });
    </script>

<script type="module">
import { supabase } from "./src/supabaseClient.js";

const form = document.getElementById('signupForm');
const errorMsg = document.getElementById('errorMsg');
const errorText = document.getElementById('errorText');
const submitBtn = document.getElementById('submitBtn');
const btnText = document.getElementById('btnText');
const btnIcon = document.getElementById('btnIcon');

// Check if user is already signed in on load
async function checkCurrentSession() {
    const { data } = await supabase.auth.getSession();
    if (data && data.session) {
        console.log("Already signed in, redirecting to Home...");
        window.location.href = './home_child_safety_v1.html';
    }
}
checkCurrentSession();

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // Reset state
    errorMsg.classList.add('hidden');
    errorText.textContent = '';
    
    const fullname = document.getElementById('fullname').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const terms = document.getElementById('terms').checked;
    
    // Validation
    if (!fullname) {
        showError('Please enter your full name.');
        return;
    }
    if (!email) {
        showError('Please enter your email address.');
        return;
    }
    if (!password) {
        showError('Please enter a password.');
        return;
    }
    if (password.length < 6) {
        showError('Password must be at least 6 characters long.');
        return;
    }
    if (!terms) {
        showError('You must agree to the Terms of Service and Privacy Policy.');
        return;
    }
    
    // Show loading
    setLoading(true);
    
    try {
        // 2. Create the authentication account
        const { data, error } = await supabase.auth.signUp({
            email,
            password
        });
        
        if (error) {
            let msg = error.message;
            if (msg && msg.toLowerCase().includes('rate limit')) {
                msg = "We've recently sent a confirmation email. Please wait a few minutes before requesting another one.";
            }
            showError(msg);
            setLoading(false);
            return;
        }
        
        const user = data?.user;
        if (!user) {
            showError('Sign up failed. Please try again.');
            setLoading(false);
            return;
        }
        
        // 3. Insert a new row into profiles
        const profilePayload = {
            user_id: user.id,
            full_name: fullname,
            username: email.split('@')[0] + Math.floor(Math.random() * 1000),
            email,
            phone_country_code: '',
            phone_number: '',
            city: '',
            role: 'Guardian', // Valid capitalized enum value
            terms_accepted: terms
            // Note: community_mode column is omitted to let the database apply its default enum value safely
        };

        // Type safety validation before insertion
        if (typeof profilePayload.user_id !== 'string' || profilePayload.user_id.length !== 36) {
            throw new Error('Invalid user_id type or length for profile insert.');
        }
        if (typeof profilePayload.full_name !== 'string' || !profilePayload.full_name) {
            throw new Error('Invalid full_name type or value for profile insert.');
        }
        if (typeof profilePayload.username !== 'string' || !profilePayload.username) {
            throw new Error('Invalid username type or value for profile insert.');
        }
        if (typeof profilePayload.email !== 'string' || !profilePayload.email) {
            throw new Error('Invalid email type or value for profile insert.');
        }
        if (profilePayload.role !== 'Guardian') {
            throw new Error('Invalid user role enum constraint.');
        }
        if (typeof profilePayload.terms_accepted !== 'boolean') {
            throw new Error('Invalid terms_accepted type for profile insert.');
        }

        const { error: profileError } = await supabase
            .from('profiles')
            .insert([profilePayload]);
            
        if (profileError) {
            console.error('Profile insertion error:', profileError);
            
            // 4. Rollback Auth to prevent orphan accounts
            console.log('Profile setup failed. Rolling back created Auth user...');
            try {
                const { data: sessionData } = await supabase.auth.getSession();
                const token = sessionData?.session?.access_token;
                if (token) {
                    const supabaseUrl = supabase.supabaseUrl || "https://ifpbdythbhlgqymsaxtz.supabase.co";
                    const supabaseKey = supabase.supabaseKey || "sb_publishable_ZFWamWb5cIOB2XastpKLhg_Xpm47wPV";
                    const deleteRes = await fetch(`${supabaseUrl}/auth/v1/user`, {
                        method: 'DELETE',
                        headers: {
                            'apikey': supabaseKey,
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    if (deleteRes.ok) {
                        console.log('Successfully rolled back newly created auth user account.');
                    } else {
                        console.error('Failed to delete auth user during rollback:', await deleteRes.text());
                    }
                }
            } catch (deleteErr) {
                console.error('Error during auth user rollback:', deleteErr);
            }
            
            // Clear session by signing out
            await supabase.auth.signOut();

            showError(`Account created, but profile setup failed: ${profileError.message}. The account was rolled back to prevent inconsistent data. Please try again.`);
            setLoading(false);
            return;
        }
        
        // 5. Success redirect to "/"
        console.log('Successfully registered and created profile! Redirecting...');
        window.location.href = '/';
        
    } catch (err) {
        console.error('Unexpected sign up error:', err);
        showError(err.message || 'An unexpected error occurred during signup.');
        setLoading(false);
    }
});

function showError(msg) {
    errorText.textContent = msg;
    errorMsg.classList.remove('hidden');
    errorMsg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function setLoading(isLoading) {
    if (isLoading) {
        submitBtn.disabled = true;
        btnText.textContent = 'Creating Account...';
        btnIcon.textContent = 'pending';
        btnIcon.classList.add('animate-spin');
    } else {
        submitBtn.disabled = false;
        btnText.textContent = 'Create Account';
        btnIcon.textContent = 'arrow_forward';
        btnIcon.classList.remove('animate-spin');
    }
}
</script>
