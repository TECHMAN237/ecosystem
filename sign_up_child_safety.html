<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            background-color: #F7F7FA;

<body class="min-h-screen flex items-center justify-center p-container-margin font-body-md text-on-background">
<main class="w-full max-w-[480px] animate-in fade-in duration-700 slide-in-from-bottom-4">
<!-- Logo/Brand Anchor -->
<div class="flex flex-col items-center mb-xl">
<div class="w-16 h-16 bg-primary-container rounded-lg flex items-center justify-center mb-md soft-glow">
<span class="material-symbols-outlined text-on-primary-container text-[32px]" data-icon="security">security</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">Create Account</h1>
<p class="font-body-md text-on-surface-variant mt-xs">Join our secure safety network for children.</p>
</div>
<!-- Main Signup Card -->
<div class="bg-surface-container-lowest rounded-lg p-lg md:p-xl soft-glow relative overflow-hidden">
<!-- Decorative Subtle Gradient -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -mr-16 -mt-16 blur-3xl"></div>
<form class="space-y-lg relative z-10" id="signupForm" action="./account_type_selection_updated_flow.html">
<!-- Full Name -->
<div class="space-y-xs">
<label class="font-label-bold text-on-surface-variant px-1" for="fullname">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="person">person</span>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-full font-body-md text-on-surface form-input transition-all duration-200" id="fullname" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-xs">
<label class="font-label-bold text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-full font-body-md text-on-surface form-input transition-all duration-200" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-xs">
<label class="font-label-bold text-on-surface-variant px-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full h-12 pl-12 pr-12 bg-surface-container-lowest border border-outline-variant rounded-full font-body-md text-on-surface form-input transition-all duration-200" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="eyeIcon">visibility</span>
</button>
</div>
</div>
<!-- Terms & Conditions -->
<div class="flex items-start gap-sm px-1">
<div class="pt-0.5">
<input class="w-5 h-5 rounded-md border-outline-variant text-primary focus:ring-primary/20 transition-all cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="font-body-md text-on-surface-variant leading-tight cursor-pointer" for="terms">
                        I agree to the <a class="text-primary font-label-bold hover:underline" href="./privacy_settings.html">Terms of Service</a> and <a class="text-primary font-label-bold hover:underline" href="./privacy_settings.html">Privacy Policy</a> regarding child data safety.
                    </label>
</div>
<!-- Primary Action -->
<button class="w-full h-14 bg-primary text-on-primary font-headline-md rounded-full shadow-lg shadow-primary/20 hover:bg-primary-container active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-xs" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-label-sm text-outline">OR SIGN UP WITH</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Options -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm h-12 border border-outline-variant rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-150" type="button">
<img alt="" class="w-5 h-5" data-alt="Official Google logo icon with vibrant four-color palette of red, yellow, green, and blue, presented in a clean minimalist vector style against a transparent background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDXIwjbuw9-mp5q5wkp1Am3651RSVhLo8Jdhuh5gA2RhOVMVjAPPC0KD4EK97x-e8AHO2s56_9hu2KqXzofpokpbN6PeNBwjMpGznPtKeIYozTZr0e_DZXAEj8KmkyssaquYqWOW1BJ1Nuzua1Dwfra7MTpNIzGEF6YzHoV2Yfp2U5bcZL5HPAaHCL4TnZSlf4oFv2k8spxKJBZaShiumADVD6R5UCq1mvioiEI96d1U22DeuwetLAVrZ5GKWJgGTkcCd8MxnyvRMEJ"/>
<span class="font-label-bold">Google</span>
</button>
<button class="flex items-center justify-center gap-sm h-12 border border-outline-variant rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-150" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="apple" data-weight="fill">ios</span>
<span class="font-label-bold">Apple</span>
</button>
</div>
</form>
</div>
<!-- Footer Link -->
<p class="text-center mt-lg font-body-md text-on-surface-variant">
            Already have an account? 
            <a class="text-primary font-headline-md hover:underline transition-all" href="./login_child_safety.html">Log In</a>
</p>
<!-- Aesthetic Backdrop Elements (Purely visual) -->
<div class="fixed top-20 left-10 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10 animate-pulse"></div>
<div class="fixed bottom-20 right-10 w-96 h-96 bg-tertiary-container/5 rounded-full blur-3xl -z-10"></div>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerText = 'visibility';
            }
        }

        // Simple button interaction feedback
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
        });
    </script>
</body></html>
