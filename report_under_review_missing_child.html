<script>
        // Micro-interaction for the illustration
        document.addEventListener('DOMContentLoaded', () => {
            const illustration = document.querySelector('img[data-alt]');
            if (illustration) {
                illustration.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                illustration.style.transform = 'translateY(20px) scale(0.95)';
                illustration.style.opacity = '0';
                
                setTimeout(() => {
                    illustration.style.transform = 'translateY(0) scale(1)';
                    illustration.style.opacity = '1';
                }, 100);
            }
        });
    </script>
