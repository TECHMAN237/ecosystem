<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="stylesheet" href="./ui-polish.css"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#e4e2e4",
                        "background": "#F5F4F2",
                        "on-background": "#1c1a24",
                        "outline-variant": "#c9c4d9",
                        "surface-container-high": "#ebe6f4",
                        "surface-bright": "#F5F4F2",
                        "surface": "#F5F4F2",
                        "secondary": "#5f5e60",
                        "on-secondary-container": "#636264",
                        "on-error": "#ffffff",
                        "tertiary": "#8f3e00",
                        "primary-fixed-dim": "#c8bfff",
                        "on-error-container": "#93000a",
                        "surface-dim": "#ddd8e6",
                        "inverse-on-surface": "#f4eefd",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#c8c6c8",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb68e",
                        "on-tertiary-fixed": "#331200",
                        "primary-fixed": "#e5deff",
                        "primary-container": "#6c4dff",
                        "on-primary-container": "#f6f0ff",
                        "outline": "#787588",
                        "on-tertiary-container": "#ffefe9",
                        "inverse-surface": "#312f3a",
                        "tertiary-fixed": "#ffdbca",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#474556",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#1c1a24",
                        "on-secondary-fixed-variant": "#474649",
                        "on-secondary-fixed": "#1b1b1d",
                        "surface-container-highest": "#e5e0ef",
                        "primary": "#532ce6",
                        "secondary-container": "#e2dfe1",
                        "on-primary-fixed": "#190064",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#5b38ee",
                        "surface-container": "#f1ebfa",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#4206d7"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "lg": "24px",
                        "gutter": "16px",
                        "container-margin": "20px",
                        "xl": "32px",
                        "base": "4px",
                        "xs": "8px",
                        "sm": "12px"
                    },
                    "fontFamily": {
                        "label-bold": ["Inter"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-bold": ["12px", {"lineHeight": "16px", "fontWeight": "700"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "headline-lg-mobile": ["20px", {"lineHeight": "28px", "fontWeight": "700"}],
                        "display": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Gradient Background Layer -->
<div class="fixed inset-0 -z-10 bg-gradient-to-br from-surface via-primary-fixed/20 to-surface-container-high/40"></div>
<!-- Header Section -->
<header class="flex items-center justify-between px-container-margin py-lg mt-base">
<div class="flex items-center gap-sm">
<div class="relative w-12 h-12 flex items-center justify-center">
<svg class="w-full h-full -rotate-90">
<circle class="text-surface-container-highest" cx="24" cy="24" fill="transparent" r="20" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-primary" cx="24" cy="24" fill="transparent" r="20" stroke="currentColor" stroke-dasharray="125.6" stroke-dashoffset="62.8" stroke-width="4"></circle>
</svg>
<span class="absolute font-headline-md text-headline-md text-primary">2</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Reporter</h1>
</div>
<button class="text-on-surface-variant font-label-bold text-label-bold px-md py-xs rounded-full hover:bg-surface-container transition-colors active:scale-95" onclick="window.location.href='./home_child_safety_v1.html'">
            Skip
        </button>
</header>
<!-- Main Content: Central Illustration -->
<main class="flex-grow flex flex-col items-center justify-center px-container-margin relative">
<div class="w-full max-w-sm relative animate-float">
<!-- Main Illustration Card -->
<div class="bg-surface-container-lowest shadow-[0px_4px_20px_rgba(108,77,255,0.06)] rounded-xl p-xl aspect-square flex flex-col items-center justify-center border border-primary/5">
<div class="grid grid-cols-2 gap-md w-full">
<div class="aspect-square rounded-lg bg-surface-container-high flex items-center justify-center text-primary transition-all hover:bg-primary-container hover:text-on-primary-container">
<span class="material-symbols-outlined text-[32px]" data-icon="backpack">backpack</span>
</div>
<div class="aspect-square rounded-lg bg-surface-container flex items-center justify-center text-secondary transition-all">
<span class="material-symbols-outlined text-[32px]" data-icon="broken_image">broken_image</span>
</div>
<div class="aspect-square rounded-lg bg-surface-container flex items-center justify-center text-secondary transition-all">
<span class="material-symbols-outlined text-[32px]" data-icon="group">group</span>
</div>
<div class="aspect-square rounded-lg bg-surface-container flex items-center justify-center text-secondary transition-all">
<span class="material-symbols-outlined text-[32px]" data-icon="photo_camera">photo_camera</span>
</div>
</div>
<!-- Location Pin Overly Center -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-16 h-16 bg-primary-container text-on-primary-container rounded-full shadow-lg flex items-center justify-center">
<span class="material-symbols-outlined text-[32px]" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
<!-- Checked Badge Top Right -->
<div class="absolute -top-xs -right-xs w-10 h-10 bg-primary text-on-primary rounded-full flex items-center justify-center border-4 border-surface shadow-md">
<span class="material-symbols-outlined text-[20px]" data-icon="check">check</span>
</div>
</div>
<!-- Overlapping Bubble bottom left -->
<div class="glass-card absolute -bottom-lg -left-xs px-lg py-md rounded-lg shadow-lg border border-white/40 flex items-center gap-sm">
<div class="w-8 h-8 rounded-full bg-tertiary-fixed flex items-center justify-center text-on-tertiary-fixed">
<span class="material-symbols-outlined text-[18px]" data-icon="description">description</span>
</div>
<div>
<p class="font-label-bold text-label-bold text-on-surface">Incident details</p>
<p class="font-label-sm text-label-sm text-on-surface-variant">Verified by 4 peers</p>
</div>
</div>
</div>
</main>
<!-- Footer Content -->
<footer class="px-container-margin pt-xl pb-xl bg-surface/40 backdrop-blur-md rounded-t-xl">
<div class="text-center mb-xl">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-sm">Verify &amp; Submit</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-xs mx-auto">
                Your accurate reports power our network. Provide details and photos to help quickly. Every detail counts in a search.
            </p>
</div>
<!-- Pagination and Button Container -->
<div class="flex items-center justify-between mt-xl">
<!-- Progress Dots -->
<div class="flex items-center gap-xs">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-6 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
<!-- Next Button -->
<button class="bg-primary-container text-on-primary-container font-label-bold text-label-bold px-xl h-14 rounded-full flex items-center gap-sm shadow-[0px_4px_20px_rgba(108,77,255,0.15)] hover:opacity-90 active:scale-95 transition-all" onclick="window.location.href='./onboarding_alerte.html'">
                Next
                <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
<!-- Bottom Padding for safe area/spacing -->
<div class="h-base"></div>
<script>
        // Simple micro-interaction for the central grid icons
        const icons = document.querySelectorAll('.grid > div');
        icons.forEach(icon => {
            icon.addEventListener('click', () => {
                icon.classList.toggle('bg-primary-container');
                icon.classList.toggle('text-on-primary-container');
                icon.classList.toggle('bg-surface-container');
                icon.classList.toggle('text-secondary');
            });
        });
    </script>
</body></html>
