<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link rel="stylesheet" href="./ui-polish.css"/>
<title>SafeGuardian - Onboarding Step 3</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ripple {
            animation: ripple-animation 3s infinite;
        }
        @keyframes ripple-animation {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.8); opacity: 0; }
        }
        .soft-gradient-bg {
            background: radial-gradient(circle at top right, #e5deff 0%, #F5F4F2 45%, #f1ebfa 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#e4e2e4",
                        "background": "#F5F4F2",
                        "on-background": "#1c1a24",
                        "outline-variant": "#c9c4d9",
                        "surface-container-high": "#ebe6f4",
                        "surface-bright": "#F5F4F2",
                        "surface": "#F5F4F2",
                        "secondary": "#5f5e60",
                        "tertiary-container": "#b55100",
                        "surface-variant": "#e5e0ef",
                        "primary-container": "#6c4dff",
                        "on-primary-container": "#f6f0ff",
                        "primary": "#532ce6",
                        "on-surface": "#1c1a24",
                        "on-surface-variant": "#474556",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "lg": "24px",
                        "gutter": "16px",
                        "container-margin": "20px",
                        "xl": "32px",
                        "base": "4px",
                        "xs": "8px",
                        "sm": "12px"
                    },
                    "fontFamily": {
                        "label-bold": ["Inter"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-bold": ["12px", {"lineHeight": "16px", "fontWeight": "700"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "display": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen font-body-md soft-gradient-bg flex flex-col">
<!-- Header Section -->
<header class="flex items-center justify-between px-container-margin pt-12 pb-6">
<div class="flex items-center gap-4">
<!-- Circular Progress Ring -->
<div class="relative w-12 h-12 flex items-center justify-center">
<svg class="w-full h-full -rotate-90">
<circle class="text-surface-container-high" cx="24" cy="24" fill="transparent" r="20" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-primary-container" cx="24" cy="24" fill="transparent" r="20" stroke="currentColor" stroke-dasharray="125.6" stroke-dashoffset="0" stroke-width="4"></circle>
</svg>
<span class="absolute font-headline-md text-headline-md text-primary">3</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface">Alerte</h1>
</div>
<button class="bg-surface-container/50 px-5 py-2 rounded-full font-label-bold text-label-bold text-on-surface-variant hover:bg-surface-container-high transition-colors active:scale-95" onclick="window.location.href='./home_child_safety_v1.html'">
            Skip
        </button>
</header>
<!-- Main Content: Stylized Map Illustration -->
<main class="flex-grow flex flex-col items-center justify-center px-container-margin relative overflow-hidden">
<div class="relative w-full max-w-[340px] aspect-square rounded-xl glass-card shadow-2xl p-4 overflow-hidden border-2 border-white/40">
<!-- Map Texture Placeholder -->
<img class="absolute inset-0 w-full h-full object-cover opacity-20 grayscale" data-alt="A minimalist and high-tech vector map illustration of a modern city grid. The style is clean with soft light purple and blue tones, featuring subtle elevation and depth. The lighting is bright and ethereal, suggesting a digital safety interface. The overall mood is precise, secure, and technologically advanced." data-location="Paris, France" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCqHUryaWnuUDbk8NLNmdwKmMLjbHUzlDrlEI9eovhSSVMeKg2_ckWcDvy9zRKk5RoBtt30awY5NpzhDtaUyj2_x18-HhvBifW6BeerqXxDiQgBBtjD5k8r7-BzZGYIqEcybvno1Rd_hwfDyR79midJGQ7mA1-hep-nO10gt2NVgEEmu7TQl9B3NyuuSZ0IfHiLU1Mg5_rU0qJW9ecEpdgaji5u2kyjFNf5OtdilRoiCskJwJx4sSy-ZAyVbgUUDE4cbeGTfOnx9cvJ"/>
<!-- Alert Ripples & Icons -->
<!-- Ripple 1 (Central Top) -->
<div class="absolute top-1/4 left-1/3">
<div class="absolute w-16 h-16 bg-error/20 rounded-full ripple -translate-x-1/2 -translate-y-1/2"></div>
<div class="relative z-10 w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center -translate-x-1/2 -translate-y-1/2 border-2 border-error">
<span class="material-symbols-outlined text-error" style="font-variation-settings: 'FILL' 1;">speaker_phone</span>
</div>
<div class="absolute -bottom-1 -right-1 w-6 h-6 bg-primary-container rounded-full border-2 border-white flex items-center justify-center -translate-x-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-[12px] text-white" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
</div>
<!-- Ripple 2 (Bottom Left) -->
<div class="absolute bottom-1/4 left-1/4">
<div class="absolute w-20 h-20 bg-error/15 rounded-full ripple -translate-x-1/2 -translate-y-1/2" style="animation-delay: 0.5s;"></div>
<div class="relative z-10 w-10 h-10 bg-white rounded-full shadow-lg flex items-center justify-center -translate-x-1/2 -translate-y-1/2 border-2 border-error">
<span class="material-symbols-outlined text-error text-[20px]">volume_up</span>
</div>
</div>
<!-- Ripple 3 (Middle Right) -->
<div class="absolute top-1/2 right-1/4">
<div class="absolute w-24 h-24 bg-error/10 rounded-full ripple -translate-x-1/2 -translate-y-1/2" style="animation-delay: 1s;"></div>
<div class="relative z-10 w-14 h-14 bg-white rounded-full shadow-lg flex items-center justify-center -translate-x-1/2 -translate-y-1/2 border-2 border-error">
<span class="material-symbols-outlined text-error text-[28px]" style="font-variation-settings: 'FILL' 1;">emergency_home</span>
</div>
</div>
<!-- Decorative Floating Elements -->
<div class="absolute top-6 right-6 w-12 h-12 bg-white rounded-2xl shadow-lg flex items-center justify-center border border-surface-container-high">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">notifications_active</span>
<div class="absolute -top-1 -right-1 w-3 h-3 bg-error rounded-full ring-2 ring-white"></div>
</div>
<div class="absolute bottom-6 left-6 w-10 h-10 bg-primary-container rounded-full shadow-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-[18px]">share</span>
</div>
</div>
</main>
<!-- Footer Content -->
<footer class="px-container-margin pb-12 flex flex-col items-center text-center">
<h2 class="font-display text-display text-on-surface mb-xs">Together, We Find</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[320px] mb-xl">
            Receive real-time, verified alerts. Share and coordinate to help families find their children. A collective, secure search makes a difference.
        </p>
<!-- Pagination Dots -->
<div class="flex gap-2 mb-xl">
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-6 h-2 rounded-full bg-primary-container"></div>
</div>
<!-- Action Button -->
<button class="w-full max-w-[320px] h-14 bg-primary-container text-on-primary-container rounded-full font-headline-md text-headline-md shadow-xl flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all" onclick="window.location.href='./success_account_created.html'">
            Get Started
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</footer>
<script>
        // Simple micro-interaction for the button
        document.querySelectorAll('footer button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                if (this.textContent.includes('Get Started')) {
                    window.location.href = './success_account_created.html';
                    return;
                }
                this.classList.add('scale-95');
                setTimeout(() => this.classList.remove('scale-95'), 150);
            });
        });
    </script>
</body></html>
