    <style>
        body {
            background-color: #F5F4F2;
            background-image: radial-gradient(circle at 0% 0%, rgba(108, 77, 255, 0.03) 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, rgba(108, 77, 255, 0.05) 0%, transparent 50%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .input-glow:focus-within {
            box-shadow: 0 0 0 4px rgba(83, 44, 230, 0.1);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-animation {
            animation: float 6s ease-in-out infinite;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="font-body-md text-on-surface min-h-screen flex flex-col items-center justify-center p-container-margin">
    <!-- App Identity -->
    <div class="mb-lg flex flex-col items-center">
        <div class="w-16 h-16 bg-primary rounded-lg flex items-center justify-center shadow-[0px_8px_24px_rgba(83,44,230,0.2)] mb-md float-animation">
            <span class="material-symbols-outlined text-on-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">security</span>
        </div>
        <h1 class="font-headline-lg text-headline-lg text-primary tracking-tight font-extrabold">Child Safety</h1>
    </div>

    <!-- Reset Password Container -->
    <div class="w-full max-w-[420px] glass-card rounded-xl p-xl shadow-[0px_4px_20px_rgba(108,77,255,0.06)] flex flex-col">
        <header class="mb-xl">
            <h2 class="font-display text-display mb-xs">Set New Password</h2>
            <p class="text-on-surface-variant font-body-md">Create a new secure password for your account.</p>
        </header>

        <!-- Form Elements -->
        <form id="resetForm" class="space-y-lg">
            <!-- Error Message Banner -->
            <div id="errorMsg" class="hidden bg-error-container text-on-error-container p-md rounded-lg text-sm flex items-center gap-sm">
                <span class="material-symbols-outlined text-[20px]">error</span>
                <span id="errorText" class="font-medium"></span>
            </div>

            <!-- Success Message Banner -->
            <div id="successMsg" class="hidden bg-emerald-50 text-emerald-800 border border-emerald-200 p-md rounded-lg text-sm flex items-start gap-sm">
                <span class="material-symbols-outlined text-[20px] text-emerald-600 mt-base">check_circle</span>
                <div class="font-medium">
                    Password updated successfully. <br/>Redirecting to Login...
                </div>
            </div>

            <!-- New Password Field -->
            <div class="space-y-xs group" id="newPasswordFieldGroup">
                <label class="font-label-bold text-label-bold text-on-surface-variant ml-base" for="password">New Password</label>
                <div class="relative flex items-center input-glow rounded-lg">
                    <span class="material-symbols-outlined absolute left-md text-outline">lock</span>
                    <input class="w-full h-12 pl-[52px] pr-[52px] bg-surface-container-lowest border-outline-variant border rounded-lg focus:border-primary focus:ring-0 transition-all outline-none text-body-md" id="password" name="password" placeholder="••••••••" type="password" required minlength="6"/>
                    <button id="togglePasswordBtn" class="absolute right-md text-outline hover:text-primary transition-colors" type="button">
                        <span class="material-symbols-outlined">visibility</span>
                    </button>
                </div>
            </div>

            <!-- Confirm Password Field -->
            <div class="space-y-xs group" id="confirmPasswordFieldGroup">
                <label class="font-label-bold text-label-bold text-on-surface-variant ml-base" for="confirm_password">Confirm New Password</label>
                <div class="relative flex items-center input-glow rounded-lg">
                    <span class="material-symbols-outlined absolute left-md text-outline">lock</span>
                    <input class="w-full h-12 pl-[52px] pr-[52px] bg-surface-container-lowest border-outline-variant border rounded-lg focus:border-primary focus:ring-0 transition-all outline-none text-body-md" id="confirm_password" name="confirm_password" placeholder="••••••••" type="password" required minlength="6"/>
                    <button id="toggleConfirmPasswordBtn" class="absolute right-md text-outline hover:text-primary transition-colors" type="button">
                        <span class="material-symbols-outlined">visibility</span>
                    </button>
                </div>
            </div>

            <!-- Submit Button -->
            <button id="submitBtn" class="w-full h-14 bg-primary text-on-primary font-headline-md text-headline-md rounded-full shadow-[0px_4px_12px_rgba(83,44,230,0.24)] hover:shadow-[0px_8px_20px_rgba(83,44,230,0.32)] active:scale-95 transition-all duration-200" type="submit">
                <span id="btnText">Update Password</span>
            </button>
        </form>

        <!-- Footer Redirect -->
        <div class="mt-xl text-center">
            <p class="font-body-md text-on-surface-variant">
                <a class="text-primary font-label-bold text-label-bold hover:underline flex items-center justify-center gap-xs" href="./login_child_safety.html">
                    <span class="material-symbols-outlined text-[16px]">arrow_back</span>
                    Back to Login
                </a>
            </p>
        </div>
    </div>

    <!-- Illustration Background Decorative -->
    <div class="fixed top-1/2 -translate-y-1/2 left-[-100px] opacity-[0.03] pointer-events-none select-none hidden lg:block">
        <span class="material-symbols-outlined text-[400px]">family_restroom</span>
    </div>
    <div class="fixed top-1/2 -translate-y-1/2 right-[-100px] opacity-[0.03] pointer-events-none select-none hidden lg:block">
        <span class="material-symbols-outlined text-[400px]">verified_user</span>
    </div>

    <script type="importmap">
    {
      "imports": {
        "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
      }
    }
    </script>
    <script type="module">
        import { supabase } from "./src/supabaseClient.js";

        const form = document.getElementById('resetForm');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const successMsg = document.getElementById('successMsg');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const newPasswordFieldGroup = document.getElementById('newPasswordFieldGroup');
        const confirmPasswordFieldGroup = document.getElementById('confirmPasswordFieldGroup');

        // Toggle Password Visibility
        const passToggleBtn = document.getElementById('togglePasswordBtn');
        if (passToggleBtn) {
            passToggleBtn.addEventListener('click', () => {
                const input = document.getElementById('password');
                const icon = passToggleBtn.querySelector('.material-symbols-outlined');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility_off';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility';
                }
            });
        }

        const confirmPassToggleBtn = document.getElementById('toggleConfirmPasswordBtn');
        if (confirmPassToggleBtn) {
            confirmPassToggleBtn.addEventListener('click', () => {
                const input = document.getElementById('confirm_password');
                const icon = confirmPassToggleBtn.querySelector('.material-symbols-outlined');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility_off';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility';
                }
            });
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorMsg.classList.remove('hidden');
            successMsg.classList.add('hidden');
        }

        function showSuccess() {
            errorMsg.classList.add('hidden');
            successMsg.classList.remove('hidden');
            newPasswordFieldGroup.classList.add('hidden');
            confirmPasswordFieldGroup.classList.add('hidden');
            submitBtn.classList.add('hidden');
        }

        function setLoading(isLoading) {
            if (isLoading) {
                submitBtn.disabled = true;
                btnText.textContent = 'Updating...';
                submitBtn.classList.add('opacity-75');
            } else {
                submitBtn.disabled = false;
                btnText.textContent = 'Update Password';
                submitBtn.classList.remove('opacity-75');
            }
        }

        // Initialize session checks and parse incoming error parameters
        async function initialize() {
            // Check for error parameters passed in redirect (e.g. invalid/expired recovery link)
            const urlParams = new URLSearchParams(window.location.search);
            const errorDescription = urlParams.get('error_description');
            const errorReason = urlParams.get('error');

            if (errorDescription) {
                showError("Link Error: " + errorDescription);
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
                return;
            } else if (errorReason) {
                showError("Link Error: The password reset link is invalid or has expired.");
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
                return;
            }

            // Verify if there is a session or if we are authenticated for password reset
            try {
                const { data: { session }, error } = await supabase.auth.getSession();
                if (error) {
                    showError("Auth Error: " + error.message);
                    submitBtn.disabled = true;
                    submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
                } else if (!session) {
                    // Check if there is an access_token in the hash
                    const hasAccessToken = window.location.hash && window.location.hash.includes('access_token');
                    if (!hasAccessToken) {
                        showError("Access Denied: No active recovery session. Please request a new password reset link.");
                        submitBtn.disabled = true;
                        submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    }
                }
            } catch (err) {
                console.error("Error setting up reset session:", err);
            }
        }

        initialize();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (!password) {
                showError('Please enter a new password.');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters long.');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match.');
                return;
            }

            setLoading(true);

            try {
                console.log("Updating password via Supabase auth...");
                const { error } = await supabase.auth.updateUser({
                    password: password
                });

                if (error) {
                    showError(error.message);
                } else {
                    showSuccess();
                    setTimeout(() => {
                        window.location.href = './login_child_safety.html';
                    }, 2000);
                }
            } catch (err) {
                console.error("Unexpected error updating password:", err);
                showError("An unexpected error occurred. Please try again.");
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
