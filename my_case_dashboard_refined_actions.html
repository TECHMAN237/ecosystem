<script>
        // Micro-interactions for buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-95');
            });
        });

        // Toggle Switch functionality (Simple simulation)
        const toggleButtons = document.querySelectorAll('.bg-secondary-fixed button');
        toggleButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                toggleButtons.forEach(b => {
                    b.classList.remove('bg-primary-container', 'text-on-primary-container');
                    b.classList.add('text-on-secondary-fixed-variant');
                });
                btn.classList.add('bg-primary-container', 'text-on-primary-container');
                btn.classList.remove('text-on-secondary-fixed-variant');
            });
        });
    </script>
