<body class="font-body-md text-on-surface antialiased min-h-screen">
<!-- Top AppBar -->
<header class="w-full sticky top-0 z-50 bg-surface dark:bg-surface-dim shadow-[0px_4px_20px_rgba(108,77,255,0.06)]">
<div class="flex items-center justify-between px-container-margin h-16 w-full max-w-screen-xl mx-auto">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high active:scale-95 transition-all" onclick="history.back()">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-display text-headline-md font-bold text-on-surface">My Case Dashboard</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high active:scale-95 transition-all" onclick="window.location.href='./alert_center.html'">
<span class="material-symbols-outlined text-on-surface-variant">notifications</span>
</button>
</div>
</header>
<main class="max-w-screen-md mx-auto px-container-margin py-lg">
<!-- Toggle Segmented Control -->
<div class="bg-surface-container-high/60 backdrop-blur p-1 rounded-full flex border border-outline-variant/15 shadow-inner mb-lg">
<button id="tabMissing" class="flex-1 py-2.5 px-4 rounded-full font-bold text-sm bg-white text-on-surface shadow-[0_4px_12px_rgba(28,26,36,0.08)] transition-all">
                Missing Children
            </button>
<button id="tabFound" class="flex-1 py-2.5 px-4 rounded-full font-semibold text-sm text-on-surface-variant hover:text-on-surface transition-all">
                Found Children
            </button>
</div>
<!-- Case List -->
<div class="space-y-md" id="caseListContainer">
    <!-- Dynamic Content -->
</div>
</main>
<!-- Floating Action Button -->
<button onclick="window.location.href='./signaler_un_disparu_tape_1.html'" class="fixed bottom-24 right-container-margin w-16 h-16 rounded-full fab-gradient text-white shadow-xl flex items-center justify-center active:scale-90 transition-transform z-40 group">
<span class="material-symbols-outlined text-[32px] group-hover:rotate-90 transition-transform duration-300">add</span>
</button>
<!-- Bottom Navigation Bar -->
<script>
        // Micro-interactions for buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-95');
            });
        });
</script>

<script type="module">
import { reportService } from './src/reportService.js';

let currentTab = 'missing';

function renderCases() {
    const container = document.getElementById('caseListContainer');
    if (!container) return;

    let reports = [];
    if (currentTab === 'missing') {
        reports = reportService.getMissingReports();
    } else {
        reports = reportService.getFoundReports();
    }

    if (reports.length === 0) {
        container.innerHTML = `
            <div class="bg-surface-container-lowest rounded-lg p-lg text-center border border-outline-variant/10">
                <span class="material-symbols-outlined text-[48px] text-on-surface-variant mb-sm">folder_open</span>
                <p class="text-body-lg text-on-surface-variant font-semibold">Aucun signalement actif.</p>
                <p class="text-body-md text-on-surface-variant/70 mt-xs">Les cas signalés s'afficheront ici.</p>
            </div>
        `;
        return;
    }

    container.innerHTML = reports.map(report => {
        const isMissing = report.type === 'missing';
        const urgencyLabel = report.urgency || (isMissing ? 'Active' : 'Recherche Famille');
        const urgencyBg = isMissing ? 'bg-tertiary-fixed text-on-tertiary-fixed' : 'bg-success text-white bg-green-600';
        const displayLabel = isMissing ? 'MISSING' : 'FOUND';
        const displayColor = isMissing ? 'text-primary-container' : 'text-secondary';
        
        return `
            <div class="bg-surface-container-lowest rounded-lg p-md custom-shadow border border-outline-variant/10 active:scale-[0.98] transition-all cursor-pointer hover:border-primary/25" data-id="${report.id}">
                <div class="flex justify-between items-start mb-md">
                    <div class="flex items-center gap-md">
                        <div class="w-16 h-16 rounded-full overflow-hidden border-2 border-primary-container/20">
                            <img alt="${report.name}" class="w-full h-full object-cover" src="${report.photo}" />
                        </div>
                        <div>
                            <h3 class="font-headline-md ${displayColor} font-bold">${displayLabel}: ${report.name} (${report.age} ans)</h3>
                            <p class="font-label-sm text-on-surface-variant">${report.location} • ${report.date || ''}</p>
                        </div>
                    </div>
                    <span class="${urgencyBg} px-3 py-1 rounded-full font-label-bold text-[10px] tracking-wider uppercase">${urgencyLabel}</span>
                </div>
                <!-- Bottom Action Row -->
                <div class="flex justify-between items-center pt-md border-t border-outline-variant/30">
                    <div class="flex items-center gap-xs">
                        <button class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container hover:bg-primary-container hover:text-white transition-all text-primary edit-btn" data-id="${report.id}">
                            <span class="material-symbols-outlined text-[20px]">edit</span>
                        </button>
                        <button class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container hover:bg-error-container hover:text-white transition-all text-error relative delete-btn" data-id="${report.id}">
                            <span class="material-symbols-outlined text-[20px]">delete</span>
                        </button>
                        <span class="ml-2 font-label-bold text-label-sm text-primary-container uppercase">En cours</span>
                    </div>
                    <button class="flex items-center gap-xs px-4 py-2 rounded-full bg-surface-container hover:bg-primary-container hover:text-white transition-all text-primary font-label-bold view-progress-btn" data-id="${report.id}">
                        <span class="material-symbols-outlined text-[20px]">bar_chart</span>
                        <span class="">Progress</span>
                    </button>
                </div>
            </div>
        `;
    }).join('');

    // Bind item click to details
    container.querySelectorAll('[data-id]').forEach(card => {
        card.addEventListener('click', (e) => {
            if (e.target.closest('button')) return;
            const id = card.getAttribute('data-id');
            const report = reportService.getReportById(id);
            if (report) {
                sessionStorage.setItem('current_view_report', JSON.stringify(report));
                window.location.href = './report_details.html';
            }
        });
    });

    // Bind edit button
    container.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = btn.getAttribute('data-id');
            const report = reportService.getReportById(id);
            if (report) {
                sessionStorage.setItem('current_view_report', JSON.stringify(report));
                window.location.href = './report_details.html';
            }
        });
    });

    // Bind delete button
    container.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = btn.getAttribute('data-id');
            if (confirm("Voulez-vous vraiment supprimer ce signalement ?")) {
                let success = false;
                if (currentTab === 'missing') {
                    success = reportService.deleteMissingReport(id);
                } else {
                    success = reportService.deleteFoundReport(id);
                }
                if (success) {
                    renderCases();
                }
            }
        });
    });
}

function updateTabButtons() {
    const tabMissing = document.getElementById('tabMissing');
    const tabFound = document.getElementById('tabFound');

    if (currentTab === 'missing') {
        tabMissing.className = "flex-1 py-2.5 px-4 rounded-full font-bold text-sm bg-white text-on-surface shadow-[0_4px_12px_rgba(28,26,36,0.08)] transition-all";
        tabFound.className = "flex-1 py-2.5 px-4 rounded-full font-semibold text-sm text-on-surface-variant hover:text-on-surface transition-all";
    } else {
        tabFound.className = "flex-1 py-2.5 px-4 rounded-full font-bold text-sm bg-white text-on-surface shadow-[0_4px_12px_rgba(28,26,36,0.08)] transition-all";
        tabMissing.className = "flex-1 py-2.5 px-4 rounded-full font-semibold text-sm text-on-surface-variant hover:text-on-surface transition-all";
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const tabMissing = document.getElementById('tabMissing');
    const tabFound = document.getElementById('tabFound');

    tabMissing.addEventListener('click', () => {
        currentTab = 'missing';
        updateTabButtons();
        renderCases();
    });

    tabFound.addEventListener('click', () => {
        currentTab = 'found';
        updateTabButtons();
        renderCases();
    });

    renderCases();
});
</script>
