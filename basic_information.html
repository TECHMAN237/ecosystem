<script type="importmap">

  "imports": {

</script>
<script type="module">
import { supabase } from "./src/supabaseClient.js";
import { reportService, DEFAULT_AVATAR } from "./src/reportService.js";

        // Simple Interaction: Toggle Password Visibility
        const togglePass = document.querySelectorAll('.material-symbols-outlined');
        togglePass.forEach(btn => {
            if (btn.innerText === 'visibility' || btn.innerText === 'visibility_off') {
                btn.addEventListener('click', function() {
                    const input = this.parentElement.querySelector('input');
                    if (input.type === 'password') {
                        input.type = 'text';
                        this.innerText = 'visibility_off';
                    } else {
                        input.type = 'password';
                        this.innerText = 'visibility';
                    }
                });
            }
        });

        // Pre-populate input fields on load
        document.addEventListener('DOMContentLoaded', () => {
            const storedName = sessionStorage.getItem('signup_fullname');
            const storedEmail = sessionStorage.getItem('signup_email');
            const storedPassword = sessionStorage.getItem('signup_password');

            if (storedName) document.getElementById('fullname').value = storedName;
            if (storedEmail) document.getElementById('email').value = storedEmail;
            if (storedPassword) {
                document.getElementById('password').value = storedPassword;
                document.getElementById('confirm_password').value = storedPassword;
            }
            
            // Pre-fill Step 3 fields if they were already typed and we came back
            const storedUsername = sessionStorage.getItem('signup_username');
            const storedCountryCode = sessionStorage.getItem('signup_phone_country_code');
            const storedPhone = sessionStorage.getItem('signup_phone_number');
            const storedCity = sessionStorage.getItem('signup_city');

            if (storedUsername) document.getElementById('username').value = storedUsername;
            if (storedCountryCode) document.getElementById('countrycode').value = storedCountryCode;
            if (storedPhone) document.getElementById('phonenumber').value = storedPhone;
            if (storedCity) document.getElementById('city').value = storedCity;
        });

        // Check if user is already signed in on load
        async function checkCurrentSession() {
            try {
                const { data } = await supabase.auth.getSession();
                if (data && data.session) {
                    console.log("Already signed in, redirecting to Home...");
                    window.location.href = './home_child_safety_v1.html';
                }
            } catch (err) {
                console.error("Error checking session on load:", err);
            }
        }
        checkCurrentSession();

        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const continueBtn = document.getElementById('continueBtn');

        function showError(msg) {
            errorText.textContent = msg;
            errorMsg.classList.remove('hidden');
            errorMsg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function setLoading(isLoading) {
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            if (isLoading) {
                continueBtn.disabled = true;
                if (btnText) btnText.textContent = 'CRÉATION DU COMPTE...';
                if (btnIcon) {
                    btnIcon.textContent = 'pending';
                    btnIcon.classList.add('animate-spin');
                }
            } else {
                continueBtn.disabled = false;
                if (btnText) btnText.textContent = 'CRÉER UN COMPTE';
                if (btnIcon) {
                    btnIcon.textContent = 'chevron_right';
                    btnIcon.classList.remove('animate-spin');
                }
            }
        }

        continueBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');
            errorText.textContent = '';

            const fullname = document.getElementById('fullname').value.trim();
            const username = document.getElementById('username').value.trim();
            const countrycode = document.getElementById('countrycode').value;
            const phonenumber = document.getElementById('phonenumber').value.trim();
            const emailInput = document.getElementById('email').value.trim();
            const city = document.getElementById('city').value.trim();
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;

            // Page 3 form validations
            if (!fullname) {
                showError('Veuillez saisir votre nom complet.');
                return;
            }
            if (!username) {
                showError('Veuillez saisir un nom d\'utilisateur.');
                return;
            }
            if (!phonenumber) {
                showError('Veuillez saisir un numéro de téléphone.');
                return;
            }
            if (!city) {
                showError('Veuillez saisir votre ville.');
                return;
            }
            if (password !== confirm_password) {
                showError('Les mots de passe ne correspondent pas.');
                return;
            }
            if (password.length < 6) {
                showError('Le mot de passe doit contenir au moins 6 caractères.');
                return;
            }

            // Retrieve values from Step 1 and Step 2
            const email = emailInput || sessionStorage.getItem('signup_email') || '';
            const terms = sessionStorage.getItem('signup_terms_accepted') === 'true';
            const role = sessionStorage.getItem('childSafetyAccountType') || 'Tuteur / Tutrice';

            // Failsafe check
            if (!email) {
                showError('L\'adresse e-mail de la page 1 est manquante. Veuillez recommencer le processus d\'inscription.');
                return;
            }
            if (!password) {
                showError('Le mot de passe de la page 1 est manquant. Veuillez recommencer le processus d\'inscription.');
                return;
            }

            setLoading(true);

            try {
                // 1. Create the authentication account
                console.log('Registering Auth account for email:', email);
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            full_name: fullname,
                            terms_accepted: terms
                        }
                    }
                });

                if (error) {
                    let msg = error.message;
                    if (msg && msg.toLowerCase().includes('rate limit')) {
                        msg = "Nous avons récemment envoyé un e-mail de confirmation. Veuillez attendre quelques minutes avant d'en demander un autre.";
                    }
                    showError(msg);
                    setLoading(false);
                    return;
                }

                const user = data?.user;
                if (!user) {
                    showError('L\'inscription a échoué. Veuillez réessayer.');
                    setLoading(false);
                    return;
                }

                // 2. Failsafe: check if profile already created by DB trigger
                console.log('Checking if profile was auto-created by DB trigger...');
                let profileCreated = false;
                try {
                    const { data: existingProfile, error: checkError } = await supabase
                        .from('profiles')
                        .select('id')
                        .eq('id', user.id)
                        .maybeSingle();

                    if (!checkError && existingProfile) {
                        console.log('Profile already created by database trigger.');
                        profileCreated = true;
                    }
                } catch (checkErr) {
                    console.warn('Could not query existing profile:', checkErr);
                }

                if (!profileCreated) {
                    // 3. Insert new row in profiles table
                    console.log('Inserting profile client-side...');
                    const profilePayload = {
                        id: user.id,
                        user_id: user.id,
                        full_name: fullname,
                        username: username,
                        email: email,
                        phone_country_code: countrycode || '',
                        phone_number: phonenumber || '',
                        city: city || '',
                        role: role,
                        terms_accepted: terms
                    };

                    const { error: profileError } = await supabase
                        .from('profiles')
                        .insert([profilePayload]);

                    if (profileError) {
                        const isDuplicate = profileError.code === '23505' || (profileError.message && profileError.message.toLowerCase().includes('already exists'));
                        if (isDuplicate) {
                            console.log('Profile created in parallel. Proceeding with success.');
                        } else {
                            console.error('Profile insertion error:', profileError);

                            // Rollback Auth user
                            console.log('Profile setup failed. Rolling back created Auth user...');
                            try {
                                const { data: sessionData } = await supabase.auth.getSession();
                                const token = sessionData?.session?.access_token;
                                if (token) {
                                    const supabaseUrl = supabase.supabaseUrl || "https://ifpbdythbhlgqymsaxtz.supabase.co";
                                    const supabaseKey = supabase.supabaseKey || "sb_publishable_ZFWamWb5cIOB2XastpKLhg_Xpm47wPV";
                                    const deleteRes = await fetch(`${supabaseUrl}/auth/v1/user`, {
                                        method: 'DELETE',
                                        headers: {
                                            'apikey': supabaseKey,
                                            'Authorization': `Bearer ${token}`
                                        }
                                    });
                                    if (deleteRes.ok) {
                                        console.log('Successfully rolled back newly created auth user account.');
                                    } else {
                                        console.error('Failed to delete auth user during rollback:', await deleteRes.text());
                                    }
                                }
                            } catch (deleteErr) {
                                console.error('Error during auth user rollback:', deleteErr);
                            }

                            await supabase.auth.signOut();
                            showError(`Compte créé, mais la configuration du profil a échoué : ${profileError.message}. Le compte a été annulé. Veuillez réessayer.`);
                            setLoading(false);
                            return;
                        }
                    }
                } else {
                    // Profile already exists, let's update it with fields
                    console.log('Updating auto-created profile with Step 2 & 3 fields...');
                    const { error: updateError } = await supabase
                        .from('profiles')
                        .update({
                            full_name: fullname,
                            username: username,
                            phone_country_code: countrycode,
                            phone_number: phonenumber,
                            city: city,
                            role: role,
                            terms_accepted: terms
                        })
                        .eq('id', user.id);

                    if (updateError) {
                        console.warn('Could not update trigger-created profile fields:', updateError);
                    }
                }

                // Save locally so home page and sidebar display immediately
                reportService.saveProfile({
                    full_name: fullname,
                    username: username,
                    phone_country_code: countrycode,
                    phone_number: phonenumber,
                    city: city,
                    role: role,
                    photo: DEFAULT_AVATAR
                });

                // Clear sign up variables from sessionStorage on success
                sessionStorage.removeItem('signup_fullname');
                sessionStorage.removeItem('signup_email');
                sessionStorage.removeItem('signup_password');
                sessionStorage.removeItem('signup_terms_accepted');
                sessionStorage.removeItem('signup_username');
                sessionStorage.removeItem('signup_phone_country_code');
                sessionStorage.removeItem('signup_phone_number');
                sessionStorage.removeItem('signup_city');
                sessionStorage.removeItem('childSafetyAccountType');

                console.log('Successfully registered and created profile! Redirecting to Home...');
                window.location.href = './home_child_safety_v1.html';

            } catch (err) {
                console.error('Unexpected signup submission error:', err);
                showError(err.message || 'An unexpected error occurred during signup submission.');
                setLoading(false);
            }
        });
    </script>
