<body class="bg-background text-on-background font-body-md min-h-screen pb-32">
<!-- Top Navigation Bar -->
<header class="w-full top-0 sticky z-50 bg-background flex items-center px-container-margin py-md">
<button class="material-symbols-outlined text-primary hover:bg-surface-container-low transition-colors p-2 rounded-full active:scale-95" onclick="history.back()">arrow_back</button>
<h1 class="ml-4 font-headline-md text-headline-md text-primary truncate">Guardian Flow</h1>
</header>
<main class="px-container-margin mt-md max-w-xl mx-auto">
<!-- Progress Indicator -->
<div class="flex items-center gap-xs mb-xl">
<div class="h-2 bg-primary active-pill rounded-full"></div>
<div class="h-2 w-2 bg-outline-variant rounded-full"></div>
<div class="h-2 w-2 bg-outline-variant rounded-full"></div>
<span class="ml-xs font-label-bold text-label-bold text-outline">Étape 1 sur 3</span>
</div>
<h2 class="font-display text-display text-on-surface mb-lg">Signaler un enfant trouvé</h2>
<form class="space-y-lg" id="foundForm">
<!-- Child Photo Upload Area -->
<div class="relative">
<label class="block font-label-bold text-label-bold text-outline mb-xs">Photo de l'enfant</label>
<div id="uploadContainer" class="border-2 border-dashed border-primary-container rounded-lg aspect-square w-full flex flex-col items-center justify-center bg-surface-container-lowest hover:bg-surface-container-low transition-colors cursor-pointer group relative overflow-hidden">
<div class="w-16 h-16 bg-primary-container/10 rounded-full flex items-center justify-center mb-md group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary text-3xl">add_a_photo</span>
</div>
<span class="font-headline-md text-headline-md text-primary">Prendre une photo</span>
<span class="font-body-md text-body-md text-outline mt-xs text-center px-xl">Capturez le visage de l'enfant de manière claire si possible</span>
<input id="fileInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" type="file"/>
</div>
</div>
<!-- Two column grid for basic info -->
<div class="grid grid-cols-2 gap-md">
<div class="space-y-xs">
<label class="block font-label-bold text-label-bold text-outline">Âge approx.</label>
<input id="age" class="w-full px-md py-sm bg-surface-container-lowest border border-outline-variant rounded-full font-body-lg text-body-lg" placeholder="ex: 5" type="number"/>
</div>
<div class="space-y-xs">
<label class="block font-label-bold text-label-bold text-outline">Sexe</label>
<select id="gender" class="w-full px-md py-sm bg-surface-container-lowest border border-outline-variant rounded-full font-body-lg text-body-lg appearance-none">
<option value="">Sélectionner</option>
<option value="fille">Fille</option>
<option value="garcon">Garçon</option>
<option value="inconnu">Inconnu</option>
</select>
</div>
</div>
<!-- Physical Description -->
<div class="space-y-xs">
<label class="block font-label-bold text-label-bold text-outline">Description physique</label>
<textarea id="physicalDescription" class="w-full px-md py-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg" placeholder="Teint, cheveux, signes distinctifs..." rows="3"></textarea>
</div>
<!-- Clothing Description -->
<div class="space-y-xs">
<label class="block font-label-bold text-label-bold text-outline">Description des vêtements</label>
<textarea id="clothingDescription" class="w-full px-md py-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg" placeholder="Couleur du t-shirt, type de chaussures..." rows="3"></textarea>
</div>
<!-- Location Found -->
<div class="space-y-xs">
<label class="block font-label-bold text-label-bold text-outline">Lieu de la découverte</label>
<div class="relative">
<input id="locationFound" class="w-full pl-xl pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-full font-body-lg text-body-lg" placeholder="Saisir l'adresse ou le lieu" type="text"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">location_on</span>
</div>
</div>
<!-- Date Found -->
<div class="space-y-xs">
<label class="block font-label-bold text-label-bold text-outline">Date de la découverte</label>
<div class="relative">
<input id="dateFound" class="w-full pl-xl pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-full font-body-lg text-body-lg" type="date"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary">calendar_today</span>
</div>
</div>
<!-- Additional Notes -->
<div class="space-y-xs">
<label class="block font-label-bold text-label-bold text-outline">Notes additionnelles</label>
<textarea id="additionalNotes" class="w-full px-md py-md bg-surface-container-lowest border border-outline-variant rounded-lg font-body-lg text-body-lg" placeholder="Circonstances, comportement de l'enfant..." rows="2"></textarea>
</div>
</form>

<!-- Navigation Action Buttons (In-flow responsive layout) -->
<div class="mt-8 mb-20 flex flex-col-reverse sm:flex-row items-center justify-between gap-4 w-full">
<button type="button" class="w-full sm:w-auto min-h-[48px] px-6 py-3.5 border border-outline-variant/40 rounded-full flex items-center justify-center gap-2 text-on-surface hover:bg-surface-container-high transition-colors font-label-bold" onclick="history.back()">
<span class="material-symbols-outlined">chevron_left</span>
<span>Précédent</span>
</button>
<button id="btnContinue" type="button" class="w-full sm:w-auto min-h-[48px] px-8 py-3.5 bg-primary text-on-primary rounded-full flex items-center justify-center gap-2 hover:opacity-90 active:scale-98 transition-all shadow-lg font-label-bold uppercase tracking-wider">
<span>Suivant</span>
<span class="material-symbols-outlined">chevron_right</span>
</button>
</div>

<script type="module">
import { formDraftState } from './src/formDraftState.js';

document.addEventListener('DOMContentLoaded', () => {
    const fileInput = document.getElementById('fileInput');
    const uploadContainer = document.getElementById('uploadContainer');
    const ageInput = document.getElementById('age');
    const genderSelect = document.getElementById('gender');
    const physicalInput = document.getElementById('physicalDescription');
    const clothingInput = document.getElementById('clothingDescription');
    const locationInput = document.getElementById('locationFound');
    const dateInput = document.getElementById('dateFound');
    const notesInput = document.getElementById('additionalNotes');
    const btnContinue = document.getElementById('btnContinue');

    function renderPhotoPreview(base64) {
        if (!uploadContainer) return;
        uploadContainer.innerHTML = `
            <img src="${base64}" class="absolute inset-0 w-full h-full object-cover" />
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
                <span class="text-white font-label-bold text-label-bold">Changer la photo</span>
            </div>
            <input id="fileInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" type="file"/>
        `;
        document.getElementById('fileInput')?.addEventListener('change', handleFileChange);
    }

    function handleFileChange(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                const base64 = evt.target.result;
                formDraftState.updateFoundDraft({ photo: base64 });
                renderPhotoPreview(base64);
            };
            reader.readAsDataURL(file);
        }
    }

    if (fileInput) {
        fileInput.addEventListener('change', handleFileChange);
    }

    // Restore existing draft
    const draft = formDraftState.getFoundDraft();
    if (draft.photo) {
        renderPhotoPreview(draft.photo);
    }
    if (draft.age) ageInput.value = draft.age;
    if (draft.gender) genderSelect.value = draft.gender;
    if (draft.physicalDescription) physicalInput.value = draft.physicalDescription;
    if (draft.clothingDescription) clothingInput.value = draft.clothingDescription;
    if (draft.location) locationInput.value = draft.location;
    if (draft.date) dateInput.value = draft.date;
    if (draft.notes) notesInput.value = draft.notes;

    // Click continue
    btnContinue.addEventListener('click', () => {
        formDraftState.updateFoundDraft({
            age: parseInt(ageInput.value) || 7,
            gender: genderSelect.value || "inconnu",
            physicalDescription: physicalInput.value.trim() || "Teint noir",
            clothingDescription: clothingInput.value.trim() || "T-shirt bleu, pantalon noir",
            location: locationInput.value.trim() || "Yaoundé, Marché Mokolo",
            date: dateInput.value || new Date().toISOString().split('T')[0],
            notes: notesInput.value.trim() || ""
        });

        window.location.href = './signaler_un_enfant_trouv_d_tails_de_la_d_couverte.html';
    });
});
</script>
