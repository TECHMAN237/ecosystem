<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<link rel="stylesheet" href="./ui-polish.css"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            -webkit-tap-highlight-color: transparent;
            background-color: #F5F4F2;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#5f5e60",
                        "on-surface": "#1c1a24",
                        "primary-container": "#6c4dff",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#312f3a",
                        "primary": "#532ce6",
                        "surface-container-high": "#ebe6f4",
                        "surface-container": "#f1ebfa",
                        "surface": "#F5F4F2",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1c1a24",
                        "outline": "#787588",
                        "outline-variant": "#c9c4d9",
                        "on-primary": "#ffffff",
                        "background": "#F5F4F2",
                        "on-primary-container": "#f6f0ff",
                        "surface-variant": "#e5e0ef",
                        "error": "#FF4D4F"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-margin": "20px",
                        "xl": "32px",
                        "sm": "12px",
                        "base": "4px",
                        "lg": "24px",
                        "xs": "8px",
                        "gutter": "16px",
                        "md": "16px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "display": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen font-body-md overflow-x-hidden pb-24">
<!-- Top App Bar -->
<header class="w-full top-0 left-0 sticky z-50 bg-surface dark:bg-background shadow-[0px_4px_20px_rgba(108,77,255,0.06)] flex justify-between items-center px-container-margin py-md">
<div class="flex items-center gap-md">
<button class="active:scale-95 duration-200 text-primary transition-opacity hover:opacity-80" onclick="history.back()">
<span class="material-symbols-outlined text-headline-lg">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">Signaler un enfant trouvé</h1>
</div>
<button class="active:scale-95 duration-200 text-primary transition-opacity hover:opacity-80">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<main class="px-container-margin py-lg space-y-lg pb-28">
<!-- Step Indicator -->
<div class="flex items-center justify-center gap-xs">
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-primary-container text-on-tertiary font-bold shadow-md">1</div>
<div class="w-12 h-0.5 bg-outline-variant rounded-full"></div>
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant font-medium">2</div>
<div class="w-12 h-0.5 bg-outline-variant rounded-full"></div>
<div class="flex items-center justify-center w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant font-medium">3</div>
</div>
<!-- Title Section -->
<div class="space-y-xs">
<h2 class="font-headline-md text-headline-md text-primary-container">Détails de la découverte</h2>
<p class="font-body-md text-on-surface-variant opacity-80">Veuillez fournir les informations sur le lieu et le moment de la découverte.</p>
</div>
<!-- Photo Upload Section -->
<div class="relative group cursor-pointer active:scale-[0.98] transition-all duration-300">
<div id="uploadContainer" class="border-2 border-dashed border-primary-container/30 bg-surface-container-lowest rounded-lg p-xl flex flex-col items-center justify-center text-center space-y-sm shadow-[0px_4px_20px_rgba(108,77,255,0.06)] relative overflow-hidden">
<div class="w-16 h-16 rounded-full bg-primary-container/10 flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined text-[32px]">photo_camera</span>
</div>
<div class="space-y-base">
<p class="font-headline-md text-primary-container">Ajouter une photo</p>
<p class="font-label-sm text-on-surface-variant">Visage dégagé de préférence</p>
</div>
</div>
<input id="fileInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>
<!-- Form Fields -->
<div class="space-y-md">
<!-- Location Input -->
<div class="space-y-xs">
<label class="font-label-sm text-on-surface-variant ml-xs">Lieu exact</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-primary-container">location_on</span>
<input id="location" class="w-full pl-[48px] pr-md py-md bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-4 focus:ring-primary-container/20 focus:border-primary-container transition-all outline-none text-body-lg" placeholder="Ex: Marché Central, Yaoundé" type="text"/>
</div>
</div>
<!-- Row: Time and Sex -->
<div class="grid grid-cols-2 gap-md">
<div class="space-y-xs">
<label class="font-label-sm text-on-surface-variant ml-xs">Heure approx.</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-primary-container">schedule</span>
<input id="time" class="w-full pl-[48px] pr-md py-md bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-4 focus:ring-primary-container/20 focus:border-primary-container transition-all outline-none text-body-lg" placeholder="Ex: 14:30" type="text"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-sm text-on-surface-variant ml-xs">Sexe</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-md text-primary-container">wc</span>
<select id="gender" class="w-full pl-[48px] pr-md py-md bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-4 focus:ring-primary-container/20 focus:border-primary-container transition-all outline-none text-body-lg appearance-none">
<option value="">Sélectionner</option>
<option value="fille">Féminin</option>
<option value="garcon">Masculin</option>
<option value="inconnu">Inconnu</option>
</select>
<span class="material-symbols-outlined absolute right-md pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
</div>
<!-- Clothing Description -->
<div class="space-y-xs">
<label class="font-label-sm text-on-surface-variant ml-xs">Tenue vestimentaire (description)</label>
<textarea id="clothingDescription" class="w-full p-md bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-4 focus:ring-primary-container/20 focus:border-primary-container transition-all outline-none text-body-lg resize-none" placeholder="Ex: T-shirt bleu, short gris" rows="3"></textarea>
</div>
</div>
</div>

<!-- Navigation Action Buttons (In-flow responsive layout) -->
<div class="mt-8 mb-20 flex flex-col-reverse sm:flex-row items-center justify-between gap-4 w-full">
<button type="button" class="w-full sm:w-auto min-h-[48px] px-6 py-3.5 border border-outline-variant/40 rounded-full flex items-center justify-center gap-2 text-on-surface hover:bg-surface-container-high transition-colors font-label-bold" onclick="history.back()">
<span class="material-symbols-outlined">chevron_left</span>
<span>Précédent</span>
</button>
<button id="btnNext" type="button" class="w-full sm:w-auto min-h-[48px] px-8 py-3.5 bg-primary text-on-primary rounded-full flex items-center justify-center gap-2 hover:opacity-90 active:scale-98 transition-all shadow-lg font-label-bold uppercase tracking-wider">
<span>Suivant</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>

<script type="module">
import { formDraftState } from './src/formDraftState.js';

document.addEventListener('DOMContentLoaded', () => {
    const fileInput = document.getElementById('fileInput');
    const uploadContainer = document.getElementById('uploadContainer');
    const locationInput = document.getElementById('location');
    const timeInput = document.getElementById('time');
    const genderSelect = document.getElementById('gender');
    const clothingInput = document.getElementById('clothingDescription');
    const btnNext = document.getElementById('btnNext');

    function renderPhotoPreview(base64) {
        if (!uploadContainer) return;
        uploadContainer.innerHTML = `
            <img src="${base64}" class="absolute inset-0 w-full h-full object-cover rounded-xl" />
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity rounded-xl">
                <span class="text-white font-label-bold text-label-bold">Changer la photo</span>
            </div>
            <input id="fileInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" type="file"/>
        `;
        document.getElementById('fileInput')?.addEventListener('change', handleFileChange);
    }

    function handleFileChange(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                const base64 = evt.target.result;
                formDraftState.updateFoundDraft({ photo: base64 });
                renderPhotoPreview(base64);
            };
            reader.readAsDataURL(file);
        }
    }

    if (fileInput) {
        fileInput.addEventListener('change', handleFileChange);
    }

    // Restore existing draft
    const draft = formDraftState.getFoundDraft();
    if (draft.photo) {
        renderPhotoPreview(draft.photo);
    }
    if (draft.location) locationInput.value = draft.location;
    if (draft.time) timeInput.value = draft.time;
    if (draft.gender) genderSelect.value = draft.gender;
    if (draft.clothingDescription) clothingInput.value = draft.clothingDescription;

    btnNext.addEventListener('click', () => {
        formDraftState.updateFoundDraft({
            location: locationInput.value.trim() || draft.location || "Yaoundé, Mokolo",
            time: timeInput.value.trim() || "14:15",
            gender: genderSelect.value || draft.gender || "inconnu",
            clothingDescription: clothingInput.value.trim() || draft.clothingDescription || "T-shirt bleu, pantalon noir"
        });

        window.location.href = './v_rifier_le_signalement_tape_2_evidence.html';
    });
});
</script>

<script src="./src/responsiveShell.js" type="module"></script>
</body></html>
