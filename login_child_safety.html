<script>
        // Simple Interaction logic
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
            btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('scale-95'));
        });

        // Toggle Password Visibility
        const passToggleBtn = document.getElementById('togglePasswordBtn');
        if (passToggleBtn) {
            passToggleBtn.addEventListener('click', () => {
                const input = document.getElementById('password');
                const icon = passToggleBtn.querySelector('.material-symbols-outlined');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility_off';
                    icon.setAttribute('data-icon', 'visibility_off');
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility';
                    icon.setAttribute('data-icon', 'visibility');
                }
            });
        }
    </script>

<script type="module">
import { supabase } from "./src/supabaseClient.js";

const form = document.getElementById('loginForm');
const errorMsg = document.getElementById('errorMsg');
const errorText = document.getElementById('errorText');
const submitBtn = document.getElementById('submitBtn');
const btnText = document.getElementById('btnText');
const googleBtn = document.getElementById('googleBtn');

if (googleBtn) {
    googleBtn.addEventListener('click', async () => {
        errorMsg.classList.add('hidden');
        errorText.textContent = '';
        try {
            console.log("Initiating Google Sign-In via Supabase...");
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + '/'
                }
            });
            if (error) {
                showError("Google Sign-In failed: " + error.message);
            }
        } catch (err) {
            console.error("Google login error:", err);
            showError("An unexpected error occurred during Google Sign-In.");
        }
    });
}

// Check session and listen to auth state changes
supabase.auth.onAuthStateChange((event, session) => {
    if (session) {
        console.log("Session active (event: " + event + "). Redirecting to Home...");
        localStorage.setItem('is_guest', 'false');
        window.location.href = './home_child_safety_v1.html';
    }
});

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // Reset state
    errorMsg.classList.add('hidden');
    errorText.textContent = '';
    
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    
    if (!email) {
        showError('Veuillez saisir votre adresse e-mail.');
        return;
    }
    if (!password) {
        showError('Veuillez saisir votre mot de passe.');
        return;
    }
    
    setLoading(true);
    
    try {
        const { data, error } = await supabase.auth.signInWithPassword({
            email,
            password
        });
        
        if (error) {
            // Requirement error message:
            // "This account does not exist or the password is incorrect. Please create a new account or try again."
            showError("Ce compte n'existe pas ou le mot de passe est incorrect. Veuillez créer un nouveau compte ou réessayer.");
            setLoading(false);
            return;
        }
        
        console.log('Login successful! Redirecting to Home...');
        window.location.href = '/';
    } catch (err) {
        console.error('Unexpected login error:', err);
        showError("Ce compte n'existe pas ou le mot de passe est incorrect. Veuillez créer un nouveau compte ou réessayer.");
        setLoading(false);
    }
});

function showError(msg) {
    errorText.textContent = msg;
    errorMsg.classList.remove('hidden');
    errorMsg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function setLoading(isLoading) {
    if (isLoading) {
        submitBtn.disabled = true;
        btnText.textContent = 'Connexion...';
    } else {
        submitBtn.disabled = false;
        btnText.textContent = 'Se connecter';
    }
}
</script>
