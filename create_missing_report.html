<!-- Top App Bar (Modified for focused task flow) -->

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface">Signaler un disparu</h1>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</div>
</header>
<main class="w-full max-w-md mx-auto px-container-margin pt-md">
<!-- Progress Tracker -->
<div class="flex items-center justify-center space-x-4 mb-xl mt-sm">

                2
            </div>

<div class="flex items-center justify-center w-6 h-6 rounded-full bg-surface-container-highest text-on-surface-variant font-label-bold text-label-bold">
                3
            </div>
</div>
<div class="text-center mb-lg">
<h2 class="font-headline-md text-headline-md text-primary mb-2">Identité de l'enfant</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Veuillez fournir les informations de base et une photo récente.</p>
</div>
<form class="space-y-6">
<!-- Photo Upload Area -->
<div class="bg-surface rounded-xl p-6 border-2 border-dashed border-outline-variant flex flex-col items-center justify-center text-center cursor-pointer hover:bg-surface-container-low hover:border-primary transition-all group shadow-soft relative overflow-hidden">
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center mb-4 group-hover:scale-110 transition-transform text-primary">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 0;">add_a_photo</span>
</div>
<p class="font-label-bold text-label-bold text-on-surface mb-1">Ajouter une photo</p>
<p class="font-body-md text-body-md text-on-surface-variant text-xs">Visage dégagé de préférence</p>
<input accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" type="file"/>
</div>
<!-- Identité Form Section -->
<div class="bg-surface rounded-xl p-md shadow-soft space-y-md">
<!-- Nom complet -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-2" for="fullName">Nom complet de l'enfant</label>
<input class="w-full h-12 px-4 bg-surface rounded-xl border border-outline-variant text-on-surface font-body-md text-body-md focus:outline-none placeholder-outline" id="fullName" placeholder="Ex: Kevin Martin" type="text"/>
</div>
<!-- Age and Gender Row -->
<div class="grid grid-cols-2 gap-md">
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-2" for="age">Âge (approx.)</label>
<input class="w-full h-12 px-4 bg-surface rounded-xl border border-outline-variant text-on-surface font-body-md text-body-md focus:outline-none placeholder-outline" id="age" placeholder="Ex: 8" type="number"/>
</div>
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-2" for="gender">Sexe</label>
<div class="relative">
<select class="w-full h-12 px-4 bg-surface rounded-xl border border-outline-variant text-on-surface font-body-md text-body-md focus:outline-none appearance-none cursor-pointer" id="gender">
<option disabled="" selected="" value="">Sélectionner</option>
<option value="garcon">Garçon</option>
<option value="fille">Fille</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
</div>
<!-- Taille -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface mb-2" for="height">Taille (approx. en m)</label>
<input class="w-full h-12 px-4 bg-surface rounded-xl border border-outline-variant text-on-surface font-body-md text-body-md focus:outline-none placeholder-outline" id="height" placeholder="Ex: 1m20" type="text"/>
</div>
</div>
</form>
