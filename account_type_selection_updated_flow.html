<script>
        function selectAccount(element) {
            // Remove active class from all cards
            document.querySelectorAll('.account-card').forEach(card => {
                card.classList.remove('active-selection');
            });
            
            // Add active class to selected card
            element.classList.add('active-selection');
            const role = element.querySelector('h3')?.innerText?.trim() || '';
            sessionStorage.setItem('childSafetyAccountType', role);
            
            // Enable and style continue button
            const continueBtn = document.getElementById('continue-btn');
            continueBtn.disabled = false;
            continueBtn.classList.remove('bg-outline', 'opacity-50', 'cursor-not-allowed');
            continueBtn.classList.add('bg-primary', 'shadow-[0_8px_25px_rgba(108,77,255,0.35)]', 'hover:shadow-[0_12px_32px_rgba(108,77,255,0.48)]', 'hover:scale-[1.01]', 'active:scale-[0.98]');
        }
    </script>

<script type="module">
import { supabase } from "./src/supabaseClient.js";

// Check session and listen to auth state changes
supabase.auth.onAuthStateChange((event, session) => {
    if (session) {
        console.log("Session active (event: " + event + "). Redirecting to Home...");
        window.location.href = './home_child_safety_v1.html';
    }
});

const continueBtn = document.getElementById('continue-btn');
const btnText = document.getElementById('btnText');
const btnIcon = document.getElementById('btnIcon');
const errorMsg = document.getElementById('errorMsg');
const errorText = document.getElementById('errorText');

function showError(msg) {
    if (errorText && errorMsg) {
        errorText.textContent = msg;
        errorMsg.classList.remove('hidden');
        errorMsg.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } else {
        alert(msg);
    }
}

function setLoading(isLoading) {
    if (isLoading) {
        continueBtn.disabled = true;
        if (btnText) btnText.textContent = 'Création du compte...';
        if (btnIcon) {
            btnIcon.textContent = 'pending';
            btnIcon.classList.add('animate-spin');
        }
    } else {
        continueBtn.disabled = false;
        if (btnText) btnText.textContent = 'Créer un compte';
        if (btnIcon) {
            btnIcon.textContent = 'arrow_forward';
            btnIcon.classList.remove('animate-spin');
        }
    }
}

continueBtn.addEventListener('click', (e) => {
    e.preventDefault();
    
    if (errorMsg) errorMsg.classList.add('hidden');
    
    const fullname = sessionStorage.getItem('signup_fullname') || '';
    const email = sessionStorage.getItem('signup_email') || '';
    const password = sessionStorage.getItem('signup_password') || '';
    const terms = sessionStorage.getItem('signup_terms_accepted') === 'true';
    const role = sessionStorage.getItem('childSafetyAccountType') || 'Guardian';

    if (!email || !password || !fullname) {
        showError('Les détails de l\'inscription des étapes précédentes sont manquants. Veuillez revenir à l\'étape 1 et réessayer.');
        return;
    }
    
    setLoading(true);
    
    try {
        console.log('Step 2 complete. Account type selected:', role);
        window.location.href = './basic_information.html';
    } catch (err) {
        console.error('Unexpected routing error:', err);
        showError('Une erreur inattendue est survenue. Veuillez réessayer.');
        setLoading(false);
    }
});
</script>
